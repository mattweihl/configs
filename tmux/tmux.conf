set-option -g prefix C-b

set -sg escape-time 0
set -g history-limit 50000

# set first window to index 1 (not 0) to map more to the keyboard layout
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

bind R refresh-client

# reload tmux config with ctrl + b + r
unbind r
bind r \
    source-file ~/.tmux.conf \;\
    display -d 2000 'Reloaded tmux config.'


unbind C-w
bind-key C-w kill-pane

set -g mouse on

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set-option -g focus-events on

set-option -g allow-rename off
set -g default-terminal "tmux-256color"

setw -g monitor-activity off
set -g visual-activity off

set -g set-titles on

set -g status-left-style bg=black,fg=white
set -g status-right-style bg=white,fg=black

set -g status-left-length 30
set -g status-left  "  #{=/20/…:session_name}  "
set -g status-right "  %l:%M %p %D  "

set -g window-status-format "  #{?#{m:nvim,#{pane_current_command}},λ,#{?#{m:claude,#{pane_current_command}},✦,$}} #I: #W #{b:pane_current_path}  "
set -g window-status-current-format "  #{?#{m:nvim,#{pane_current_command}},λ,#{?#{m:claude,#{pane_current_command}},✦,$}} #I: #W #{b:pane_current_path}  "
set -g window-status-current-style bg=white,fg=black
set -g status-style bg=black,fg=white

bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind D split-window -h -l 50% -c "#{pane_current_path}"

# vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind m \
    set -g mouse \;\
    display "Mouse: #{?mouse,on,off}"

set-option -g allow-passthrough on
set-option -g set-clipboard on

set -s copy-command 'printf "\033]52;c;$(base64)\a" > /dev/tty'
bind -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel

set -s extended-keys on

set -ag terminal-overrides ',*:RGB:Smulx=\E[4::%p1%dm:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

